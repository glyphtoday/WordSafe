<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WordSafe</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --door:      #2e3d2e;
      --slot:      #1c291c;
      --text-on:   #ddeacc;
      --text-off:  rgba(180, 220, 150, 0.22);
      --gold:      #c8a830;
      --gold-dk:   #6a5610;
      --item-h:    72px;
    }

    body {
      background: var(--door);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Georgia', serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── faint title ── */
    .wordmark {
      letter-spacing: 8px;
      font-size: 0.65rem;
      color: rgba(200, 230, 170, 0.12);
      text-transform: uppercase;
      margin-bottom: 52px;
    }

    /* ── drums wrapper ── */
    .lock-body {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* horizontal bar that sits across all drums at center height */
    .center-bar {
      position: absolute;
      left: -18px;
      right: -18px;
      top: 50%;
      height: var(--item-h);
      transform: translateY(-50%);
      border-top: 1px solid rgba(255, 255, 255, 0.09);
      border-bottom: 1px solid rgba(255, 255, 255, 0.09);
      pointer-events: none;
      z-index: 0;
    }

    /* ── single drum column ── */
    .drum-col {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* drum viewport */
    .drum-window {
      width: 92px;
      height: calc(var(--item-h) * 3);
      overflow: hidden;
      border-radius: 8px;
      background: var(--slot);
      border: 1px solid rgba(255, 255, 255, 0.06);
      position: relative;
      cursor: pointer;
      /* fade top and bottom edges */
      -webkit-mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 26%,
        black 74%,
        transparent 100%
      );
      mask-image: linear-gradient(
        to bottom,
        transparent 0%,
        black 26%,
        black 74%,
        transparent 100%
      );
      transition: border-color 0.35s, box-shadow 0.35s;
    }

    /* click zones: invisible top/bottom halves */
    .drum-zone-up,
    .drum-zone-down {
      position: absolute;
      left: 0; right: 0;
      height: 50%;
      z-index: 10;
    }
    .drum-zone-up   { top: 0; }
    .drum-zone-down { bottom: 0; }

    /* scrolling track — 5 items */
    .drum-track {
      display: flex;
      flex-direction: column;
      transform: translateY(calc(var(--item-h) * -1));
      will-change: transform;
    }

    .drum-item {
      height: var(--item-h);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      font-size: 1.55rem;
      font-weight: bold;
      letter-spacing: 4px;
      color: var(--text-off);
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .drum-item.is-current {
      color: var(--text-on);
      font-size: 1.7rem;
    }

    /* heat states on drum-window */
    .drum-window.h-correct { border-color: #3ddc3d; box-shadow: 0 0 20px rgba(61,220,61,0.25); }
    .drum-window.h-hot     { border-color: #ff5020; box-shadow: 0 0 20px rgba(255,80,32,0.25); }
    .drum-window.h-warm    { border-color: #ffa020; box-shadow: 0 0 20px rgba(255,160,32,0.25); }
    .drum-window.h-cool    { border-color: #40aaee; box-shadow: 0 0 20px rgba(64,170,238,0.25); }
    .drum-window.h-cold    { border-color: #6060ee; box-shadow: 0 0 20px rgba(96,96,238,0.25); }

    /* ── attempt dots ── */
    .attempt-dots {
      display: flex;
      gap: 7px;
    }
    .adot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      transition: background 0.3s, box-shadow 0.3s;
    }
    .adot.h-correct { background: #3ddc3d; box-shadow: 0 0 5px #3ddc3d; }
    .adot.h-hot     { background: #ff5020; box-shadow: 0 0 5px #ff5020; }
    .adot.h-warm    { background: #ffa020; box-shadow: 0 0 5px #ffa020; }
    .adot.h-cool    { background: #40aaee; box-shadow: 0 0 5px #40aaee; }
    .adot.h-cold    { background: #6060ee; box-shadow: 0 0 5px #6060ee; }

    /* ── handle ── */
    .handle-wrap {
      margin-top: 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .handle-btn {
      display: flex;
      align-items: center;
      background: none;
      border: none;
      padding: 0;
      cursor: pointer;
      transition: transform 0.15s ease;
    }
    .handle-btn:active:not([disabled]) { transform: translateX(12px); }
    .handle-btn[disabled] { opacity: 0.38; cursor: default; }

    .handle-tab {
      width: 14px;
      height: 52px;
      background: var(--door);
      border: 1px solid rgba(255,255,255,0.08);
      border-right: none;
      border-radius: 4px 0 0 4px;
    }
    .handle-grip {
      width: 80px;
      height: 36px;
      background: var(--gold);
      border: 2px solid var(--gold-dk);
      border-radius: 0 18px 18px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.58rem;
      font-weight: bold;
      letter-spacing: 3px;
      color: rgba(0, 0, 0, 0.45);
      text-transform: uppercase;
    }

    .handle-hint {
      font-size: 0.6rem;
      letter-spacing: 3px;
      color: rgba(200, 230, 170, 0.18);
      text-transform: uppercase;
    }

    /* ── shake ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      18%      { transform: translateX(-10px); }
      36%      { transform: translateX(10px); }
      54%      { transform: translateX(-7px); }
      72%      { transform: translateX(7px); }
      90%      { transform: translateX(-3px); }
    }
    .shaking { animation: shake 0.42s ease; }

    /* ── overlay ── */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(14, 20, 14, 0.93);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
    }
    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .ov-card {
      text-align: center;
      padding: 44px 36px;
      max-width: 360px;
      width: 90%;
    }
    .ov-emoji  { font-size: 3.2rem; margin-bottom: 14px; }
    .ov-title  {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 5px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .ov-bust .ov-title { color: #ff5555; }
    .ov-sub {
      font-size: 0.8rem;
      letter-spacing: 1px;
      color: rgba(200, 220, 170, 0.45);
      margin-bottom: 26px;
      line-height: 1.6;
    }
    .share-box {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 8px;
      padding: 16px 18px;
      font-family: monospace;
      font-size: 0.85rem;
      color: rgba(210, 240, 185, 0.75);
      line-height: 1.9;
      margin-bottom: 18px;
      white-space: pre-wrap;
      text-align: left;
    }
    .btn-copy {
      background: var(--gold);
      border: none;
      border-radius: 8px;
      padding: 11px 32px;
      font-family: 'Georgia', serif;
      font-size: 0.78rem;
      font-weight: bold;
      letter-spacing: 3px;
      color: rgba(0, 0, 0, 0.55);
      cursor: pointer;
      text-transform: uppercase;
      transition: opacity 0.1s;
    }
    .btn-copy:hover { opacity: 0.82; }
    .copied-hint {
      margin-top: 9px;
      font-size: 0.68rem;
      color: rgba(130, 210, 100, 0.6);
      letter-spacing: 1px;
      min-height: 16px;
    }
  </style>
</head>
<body>

<div class="wordmark">WordSafe</div>

<div class="lock-body" id="lockBody">
  <div class="center-bar"></div>
  <!-- drum columns inserted by JS -->
</div>

<div class="handle-wrap">
  <button class="handle-btn" id="handleBtn" onclick="pullHandle()">
    <div class="handle-tab"></div>
    <div class="handle-grip">Pull</div>
  </button>
  <div class="handle-hint" id="handleHint">pull to open</div>
</div>

<div class="overlay" id="overlay">
  <div class="ov-card" id="ovCard">
    <div class="ov-emoji"  id="ovEmoji"></div>
    <div class="ov-title"  id="ovTitle"></div>
    <div class="ov-sub"    id="ovSub"></div>
    <div class="share-box" id="shareBox"></div>
    <button class="btn-copy" onclick="copyShare()">Copy Result</button>
    <div class="copied-hint" id="copiedHint"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// WORD LIST
// ═══════════════════════════════════════════════════════════════
const WORDS = [

  // Medium $1000
  { word:'BOUNCE', difficulty:'medium', value:1000 },
  { word:'SHRINK', difficulty:'medium', value:1000 },
  { word:'TURNIP', difficulty:'medium', value:1000 },

  { word:'CELLAR', difficulty:'medium', value:1000 },
  { word:'GOBLIN', difficulty:'medium', value:1000 },
  { word:'LIZARD', difficulty:'medium', value:1000 },
  { word:'MUFFIN', difficulty:'medium', value:1000 },
  { word:'NUZZLE', difficulty:'medium', value:1000 },

  { word:'TANGLE', difficulty:'medium', value:1000 },
  { word:'UNWIND', difficulty:'medium', value:1000 },
  { word:'VERTEX', difficulty:'medium', value:1000 },
  { word:'WIGGLE', difficulty:'medium', value:1000 },
  { word:'YOGURT', difficulty:'medium', value:1000 },
  { word:'ZEALOT', difficulty:'medium', value:1000 },
  { word:'BLOTCH', difficulty:'medium', value:1000 },
  { word:'CLUTCH', difficulty:'medium', value:1000 },
  // Hard $2000
  { word:'SCULPT', difficulty:'hard',   value:2000 },
  { word:'EXEMPT', difficulty:'hard',   value:2000 },
  { word:'ABRUPT', difficulty:'hard',   value:2000 },
  { word:'SCRIPT', difficulty:'hard',   value:2000 },
  { word:'SHRIMP', difficulty:'hard',   value:2000 },
  { word:'SQUIRT', difficulty:'hard',   value:2000 },
  { word:'THWART', difficulty:'hard',   value:2000 },
  { word:'SMUDGE', difficulty:'hard',   value:2000 },
  { word:'CYGNET', difficulty:'hard',   value:2000 },
  { word:'KVETCH', difficulty:'hard',   value:2000 },
  { word:'PHLEGM', difficulty:'hard',   value:2000 },
  { word:'FLYSCH', difficulty:'hard',   value:2000 },
  { word:'THATCH', difficulty:'hard',   value:2000 },
  { word:'SPRITZ', difficulty:'hard',   value:2000 },
  { word:'STYMIE', difficulty:'hard',   value:2000 },
  { word:'BLURBS', difficulty:'hard',   value:2000 },
].filter(w => w.word.length === 6);

// ═══════════════════════════════════════════════════════════════
// DIGRAM POOLS (by position)
// ═══════════════════════════════════════════════════════════════
const POOL = [
  ['BA','BE','BI','BL','BO','BR','BU','CA','CH','CL','CO','CR','DE','DI','DO',
   'DR','EX','FL','FO','FR','GA','GL','GO','GR','HA','HE','HI','HO','HU','IN',
   'JO','KI','LA','LE','LI','LO','MA','ME','MI','MO','MU','NO','PA','PL','PO',
   'PR','PU','QU','RA','RE','RO','SA','SC','SE','SH','SI','SK','SL','SM','SN',
   'SO','SP','SQ','ST','SU','SW','TA','TE','TH','TI','TO','TR','TU','TW','UN',
   'VA','WA','WH','WI','WO','ZE','ZI'],
  ['ND','NG','NK','NT','LL','PP','TT','RR','SS','FF','CK','CT','LT','MP','RT',
   'ST','NN','TH','SH','CH','RI','LE','IN','AN','AR','ER','OR','ON','UN','AL',
   'EN','AT','OT','OW','OL','OU','IR','UR','IS','IT','IG','LU','LO','LA','LI',
   'RU','RA','ET','EL','EM','IM','IP','AM','AP','AY','EY','EW','EE','OO','AU',
   'GG','BB','DD','MM','EI','IE','UI','OI','ZZ','WL','WN','WI','GL','PL','BL'],
  ['ER','ED','EN','ES','LY','AL','EL','ON','OR','OT','IN','AN','AT','LE','ND',
   'NG','NT','NK','MP','RD','RT','LT','GE','CE','SE','TE','DE','VE','KE','RE',
   'HT','CH','SH','TH','FT','ST','SK','SS','LL','OW','OY','AY','EY','EW','EE',
   'OO','IP','IT','IS','UM','US','UT','ID','UP','AM','AS','OX','PH','ET','EK',
   'GY','RY','NY','TY','BY','DY','FY','PY','SY','ZE','XE','PE','ME'],
];

// ═══════════════════════════════════════════════════════════════
// SEEDED RNG
// ═══════════════════════════════════════════════════════════════
function makeRng(seed) {
  let s = seed >>> 0;
  return () => { s = Math.imul(1664525, s) + 1013904223 >>> 0; return s / 0x100000000; };
}
function shuffleArr(arr, rng) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ═══════════════════════════════════════════════════════════════
// DATE UTILITIES
// ═══════════════════════════════════════════════════════════════
function todayUTC() {
  const d = new Date();
  return `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;
}
function dateSeed(s) { return s.split('-').reduce((a, n, i) => a + parseInt(n) * [10000,100,1][i], 0); }
function dayNumber(s) {
  return Math.floor((new Date(s+'T00:00:00Z') - new Date('2025-01-01')) / 86400000) + 1;
}

// ═══════════════════════════════════════════════════════════════
// BUILD DAILY PUZZLE
// ═══════════════════════════════════════════════════════════════
function buildPuzzle(dateStr) {
  const seed = dateSeed(dateStr);
  const wordObj = shuffleArr(WORDS, makeRng(seed ^ 0xDEADBEEF))[0];
  const word    = wordObj.word;
  const digrams = [word.slice(0,2), word.slice(2,4), word.slice(4,6)];

  const dials = digrams.map((correct, pos) => {
    const pool    = POOL[pos].filter(d => d !== correct);
    const options = shuffleArr([correct, ...shuffleArr(pool, makeRng(seed ^ (pos*0x1337+0xCAFE))).slice(0,7)],
                               makeRng(seed ^ (pos*0xABCD)));
    return { options, correctIdx: options.indexOf(correct) };
  });

  return { ...wordObj, digrams, dials, dateStr };
}

// ═══════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════
const ATTEMPTS_TOTAL = 4;
const STASH_KEY = 'wordsafe_stash';
const STATE_KEY = 'wordsafe_state';

let puzzle, gs; // gs = game state

function loadState() {
  const today = todayUTC();
  puzzle = buildPuzzle(today);

  const stash = (() => { const v = parseInt(localStorage.getItem(STASH_KEY)); return isNaN(v) ? 1000 : v; })();
  let saved = null;
  try { saved = JSON.parse(localStorage.getItem(STATE_KEY)); } catch(e) {}

  if (saved && saved.dateStr === today) {
    gs = { ...saved, stash };
  } else {
    gs = { dateStr:today, stash, selections:[0,0,0], attempts:[], attemptsLeft:ATTEMPTS_TOTAL, status:'playing' };
    saveState();
  }
}
function saveState() {
  const { stash, ...rest } = gs;
  try { localStorage.setItem(STATE_KEY, JSON.stringify(rest)); localStorage.setItem(STASH_KEY, String(gs.stash)); } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// HEAT
// ═══════════════════════════════════════════════════════════════
function dialDist(a, b)   { const d = Math.abs(a-b); return Math.min(d, 8-d); }
function heatClass(dist)  { return ['h-correct','h-hot','h-warm','h-cool','h-cold'][Math.min(dist,4)]; }

// ═══════════════════════════════════════════════════════════════
// DRUM DOM HELPERS
// ═══════════════════════════════════════════════════════════════
const ITEM_H = 72; // must match --item-h

function optAt(dialIdx, offset) {
  const sel  = gs.selections[dialIdx];
  const idx  = ((sel + offset) % 8 + 8) % 8;
  return puzzle.dials[dialIdx].options[idx];
}

function updateDrumItems(i) {
  const track = document.getElementById(`track${i}`);
  if (!track) return;
  const items = track.querySelectorAll('.drum-item');
  // track has 5 items: offsets -2, -1, 0, +1, +2
  [-2,-1,0,1,2].forEach((off, j) => {
    items[j].textContent  = optAt(i, off);
    items[j].classList.toggle('is-current', off === 0);
  });
}

function applyHeatToDrum(i) {
  const win = document.getElementById(`win${i}`);
  if (!win || gs.attempts.length === 0) return;
  // clear previous
  win.classList.remove('h-correct','h-hot','h-warm','h-cool','h-cold');
  const dist = gs.attempts[gs.attempts.length-1].distances[i];
  win.classList.add(heatClass(dist));
}

function updateAttemptDots(i) {
  const row = document.getElementById(`dots${i}`);
  if (!row) return;
  const dots = row.querySelectorAll('.adot');
  gs.attempts.forEach((att, a) => {
    dots[a].className = 'adot ' + heatClass(att.distances[i]);
  });
}

// ═══════════════════════════════════════════════════════════════
// SPIN
// ═══════════════════════════════════════════════════════════════
const spinning = [false, false, false];

function spinDial(i, dir) {
  // dir: +1 = next (scroll up), -1 = prev (scroll down)
  if (spinning[i] || gs.status !== 'playing') return;
  spinning[i] = true;

  const track  = document.getElementById(`track${i}`);
  const target = dir === 1 ? -2 * ITEM_H : 0;

  track.style.transition = `transform 0.15s ease`;
  track.style.transform  = `translateY(${target}px)`;

  setTimeout(() => {
    gs.selections[i] = ((gs.selections[i] + dir) % 8 + 8) % 8;
    track.style.transition = 'none';
    track.style.transform  = `translateY(${-ITEM_H}px)`;
    updateDrumItems(i);
    saveState();
    spinning[i] = false;
  }, 160);
}

// ═══════════════════════════════════════════════════════════════
// BUILD DOM
// ═══════════════════════════════════════════════════════════════
function buildDrums() {
  const lb = document.getElementById('lockBody');
  // remove old drum columns (keep center-bar)
  lb.querySelectorAll('.drum-col').forEach(el => el.remove());

  for (let i = 0; i < 3; i++) {
    const col = document.createElement('div');
    col.className = 'drum-col';

    // window
    const win = document.createElement('div');
    win.className = 'drum-window';
    win.id = `win${i}`;

    // click zones
    const zUp   = document.createElement('div');
    zUp.className   = 'drum-zone-up';
    zUp.onclick = () => spinDial(i, -1);
    const zDown = document.createElement('div');
    zDown.className = 'drum-zone-down';
    zDown.onclick = () => spinDial(i, +1);

    // track
    const track = document.createElement('div');
    track.className = 'drum-track';
    track.id = `track${i}`;
    track.style.transform = `translateY(${-ITEM_H}px)`;

    [-2,-1,0,1,2].forEach(off => {
      const item = document.createElement('div');
      item.className = 'drum-item' + (off === 0 ? ' is-current' : '');
      item.textContent = optAt(i, off);
      track.appendChild(item);
    });

    win.appendChild(track);
    win.appendChild(zUp);
    win.appendChild(zDown);

    // scroll wheel
    win.addEventListener('wheel', e => {
      e.preventDefault();
      spinDial(i, e.deltaY > 0 ? 1 : -1);
    }, { passive: false });

    // touch swipe
    let touchStartY = null;
    win.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; }, { passive: true });
    win.addEventListener('touchend', e => {
      if (touchStartY === null) return;
      const dy = touchStartY - e.changedTouches[0].clientY;
      if (Math.abs(dy) > 12) spinDial(i, dy > 0 ? 1 : -1);
      touchStartY = null;
    }, { passive: true });

    col.appendChild(win);

    // attempt dots
    const dots = document.createElement('div');
    dots.className = 'attempt-dots';
    dots.id = `dots${i}`;
    for (let a = 0; a < ATTEMPTS_TOTAL; a++) {
      const d = document.createElement('div');
      d.className = 'adot';
      dots.appendChild(d);
    }
    col.appendChild(dots);

    lb.appendChild(col);

    // restore heat if game already in progress
    applyHeatToDrum(i);
    updateAttemptDots(i);
  }
}

function refreshHandleState() {
  const btn  = document.getElementById('handleBtn');
  const hint = document.getElementById('handleHint');
  if (gs.status !== 'playing') {
    btn.disabled = true;
    hint.textContent = gs.status === 'won' ? 'safe opened' : 'busted';
  } else {
    btn.disabled = false;
    hint.textContent = 'pull to open';
  }
}

// ═══════════════════════════════════════════════════════════════
// PULL HANDLE
// ═══════════════════════════════════════════════════════════════
function pullHandle() {
  if (gs.status !== 'playing') return;

  const distances = gs.selections.map((sel, i) => dialDist(sel, puzzle.dials[i].correctIdx));
  const isWin     = distances.every(d => d === 0);

  gs.attempts.push({ selections: [...gs.selections], distances });
  gs.attemptsLeft--;

  // update dots & heat
  for (let i = 0; i < 3; i++) {
    applyHeatToDrum(i);
    updateAttemptDots(i);
  }

  if (isWin) {
    gs.status = 'won';
    gs.stash += puzzle.value;
    saveState();
    refreshHandleState();
    setTimeout(() => showOverlay(true), 500);
  } else if (gs.attemptsLeft === 0) {
    gs.status = 'lost';
    gs.stash  = 0;
    saveState();
    refreshHandleState();
    document.getElementById('lockBody').classList.add('shaking');
    setTimeout(() => {
      document.getElementById('lockBody').classList.remove('shaking');
      showOverlay(false);
    }, 600);
  } else {
    saveState();
    document.getElementById('lockBody').classList.add('shaking');
    setTimeout(() => document.getElementById('lockBody').classList.remove('shaking'), 420);
  }
}

// ═══════════════════════════════════════════════════════════════
// OVERLAY
// ═══════════════════════════════════════════════════════════════
function showOverlay(won) {
  const card = document.getElementById('ovCard');
  card.className = 'ov-card' + (won ? '' : ' ov-bust');

  document.getElementById('ovEmoji').textContent = won ? '🔓' : '🚨';
  document.getElementById('ovTitle').textContent = won ? 'CRACKED IT' : 'BUSTED';

  const used = ATTEMPTS_TOTAL - gs.attemptsLeft;
  document.getElementById('ovSub').textContent = won
    ? `Opened in ${used} attempt${used!==1?'s':''} · +$${puzzle.value.toLocaleString()} · Stash: $${gs.stash.toLocaleString()}`
    : `Failed to crack it · Stash wiped · $0 remaining`;

  document.getElementById('shareBox').textContent = buildShareText(won);
  document.getElementById('overlay').classList.add('visible');
}

function buildShareText(won) {
  const day  = dayNumber(gs.dateStr);
  const used = ATTEMPTS_TOTAL - gs.attemptsLeft;
  const heat = d => ['🟩','🟧','🟨','🟦','🟪'][Math.min(d,4)];
  const lines = [
    `🔐 WordSafe — Day #${day}`,
    won ? `🔓 Opened ${used}/${ATTEMPTS_TOTAL} · +$${puzzle.value.toLocaleString()}`
        : `🚨 Busted  0/${ATTEMPTS_TOTAL}`,
    '',
    ...gs.attempts.map(a => a.distances.map(heat).join('  ')),
    ...(won ? [] : Array(ATTEMPTS_TOTAL - gs.attempts.length).fill('⬛  ⬛  ⬛')),
    '',
    `${puzzle.difficulty.toUpperCase()} · $${puzzle.value.toLocaleString()} prize`,
    'wordsafe.game',
  ];
  return lines.join('\n');
}

function copyShare() {
  const text = document.getElementById('shareBox').textContent;
  const hint = document.getElementById('copiedHint');
  const show = () => { hint.textContent = '✓ Copied'; setTimeout(() => { hint.textContent = ''; }, 2500); };
  navigator.clipboard ? navigator.clipboard.writeText(text).then(show).catch(() => fallbackCopy(text, show))
                      : fallbackCopy(text, show);
}
function fallbackCopy(text, cb) {
  const t = document.createElement('textarea');
  t.value = text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t);
  cb();
}

// ═══════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════
let focusDial = 0;
document.addEventListener('keydown', e => {
  if (gs.status !== 'playing') return;
  if (e.key === 'ArrowUp')    { spinDial(focusDial, -1); e.preventDefault(); }
  if (e.key === 'ArrowDown')  { spinDial(focusDial,  1); e.preventDefault(); }
  if (e.key === 'ArrowLeft')  { spinDial(focusDial, -1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { spinDial(focusDial,  1); e.preventDefault(); }
  if (e.key === 'Tab')        { focusDial = (focusDial + (e.shiftKey ? -1 : 1) + 3) % 3; e.preventDefault(); }
  if (e.key === 'Enter' || e.key === ' ') { pullHandle(); e.preventDefault(); }
  if (e.key === '1') focusDial = 0;
  if (e.key === '2') focusDial = 1;
  if (e.key === '3') focusDial = 2;
});

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
loadState();
buildDrums();
refreshHandleState();

if (gs.status !== 'playing') {
  setTimeout(() => showOverlay(gs.status === 'won'), 400);
}
</script>
